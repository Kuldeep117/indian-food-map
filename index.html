        [data-theme="light"] header{background:linear-gradient(135deg,#fff5e6,#ffe8cc)}
        .header-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(233,69,96,.15),transparent 50%),radial-gradient(ellipse at 70% 50%,rgba(0,212,255,.1),transparent 50%);animation:hpulse 4s ease-in-out infinite}
        @keyframes hpulse{0%,100%{opacity:.7}50%{opacity:1}}
        header h1{font-family:'Playfair Display',serif;font-size:clamp(2em,6vw,4em);background:linear-gradient(135deg,#e94560,#ff9900,#e94560);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s linear infinite,fadeDown .8s ease;position:relative}
        @keyframes shimmer{to{background-position:200% center}}
        @keyframes fadeDown{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}
        header p{color:var(--subtext);margin-top:10px;font-size:1.1em;position:relative}

        .stat{text-align:center}.stat-num{font-size:1.8em;font-weight:700;color:var(--accent)}.stat-label{font-size:.75em;color:var(--subtext)}
        .controls{background:var(--dish-bg);padding:20px;border-bottom:1px solid var(--card-border)}
        .search-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
        .search-row input{padding:12px 20px;width:300px;border-radius:50px;border:2px solid var(--accent);background:var(--input-bg);color:var(--text);font-size:15px;outline:none;transition:box-shadow .3s}
        .search-row input:focus{box-shadow:0 0 20px rgba(233,69,96,.3)}
        .btn{padding:10px 18px;border-radius:50px;border:none;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .2s}
        .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}.btn-primary:hover{transform:scale(1.05)}
        .btn-outline{background:transparent;border:1.5px solid var(--accent);color:var(--accent)}
        .btn-outline:hover,.btn-outline.active{background:var(--accent);color:#fff}
        .btn-green{background:transparent;border:1.5px solid #00b894;color:#00b894}
        .btn-green:hover,.btn-green.active{background:#00b894;color:#fff}
        .btn-red{background:transparent;border:1.5px solid #e94560;color:#e94560}
        .btn-red:hover,.btn-red.active{background:#e94560;color:#fff}
        .btn-wa{background:#25D366;color:#fff;border:none}.btn-print{background:#555;color:#fff;border:none}

        .sort-row{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
        .sort-row select{padding:8px 14px;border-radius:20px;border:1.5px solid var(--accent);background:var(--input-bg);color:var(--text);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif}
        .states{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;padding:25px;max-width:1400px;margin:0 auto}
        .card{background:var(--card-bg);border-radius:16px;border:1px solid var(--card-border);overflow:hidden;transition:transform .3s,box-shadow .3s;animation:slideUp .5s ease both}
        .card:hover{transform:translateY(-6px);box-shadow:0 15px 40px rgba(233,69,96,.2);border-color:var(--accent)}
        @keyframes slideUp{from{opacity:0;transform:translateY(25px)}to{opacity:1;transform:translateY(0)}}

        .card-photo-emoji{position:relative;z-index:1}
        .region-badge{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.7);color:#fff;padding:3px 10px;border-radius:20px;font-size:11px;backdrop-filter:blur(5px);z-index:2}
        .veg-badge{position:absolute;top:10px;left:10px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;z-index:2}

        .card-body{padding:16px}
        .card h2{font-family:'Playfair Display',serif;font-size:1.2em;color:var(--accent)}
        .capital{color:var(--subtext);font-size:12px;margin-bottom:6px}
        .star-rating{display:flex;gap:3px;margin:5px 0;align-items:center}
        .star{font-size:16px;cursor:pointer;transition:transform .1s;color:#444}.star.filled{color:#ffd700}.star:hover{transform:scale(1.3)}
        .rating-count{font-size:11px;color:var(--subtext);margin-left:5px}
        .section-label{font-size:11px;font-weight:600;color:var(--subtext);text-transform:uppercase;letter-spacing:1px;margin:10px 0 4px}
        .dish{background:var(--dish-bg);padding:6px 10px;margin:3px 0;border-radius:8px;font-size:13px;border-left:3px solid var(--accent2)}

        .dish.nonveg-dish{border-left-color:#e94560}.dish.nonveg-dish span{color:#e94560}

        .price{color:#00b894;font-size:13px;margin-top:8px;font-weight:500}
        .tip{background:rgba(0,184,148,.08);padding:7px 10px;margin-top:7px;border-radius:8px;font-size:12px;color:#00b894;border-left:3px solid #00b894}

        .btn-small{padding:6px 14px;font-size:12px;border-radius:20px;border:none;background:var(--accent);color:#fff;cursor:pointer}

    </style>
</head>

var currentRegion='all',currentDiet='all',userRatings={},reviews={},revStars={};

function renderCards(list){
  var c=document.getElementById('states');c.innerHTML='';
  document.getElementById('noResults').style.display=list.length===0?'block':'none';
  document.getElementById('stateCount').textContent=list.length;
  list.forEach(function(s,idx){
    var card=document.createElement('div');card.className='card';card.style.animationDelay=(idx*.04)+'s';
    var dietLabel=s.diet==='veg'?'🟢 Veg':s.diet==='nonveg'?'🔴 Non-Veg':'🟡 Veg & Non-Veg';
    var photoHTML=s.photo?'<img src="'+s.photo+'" alt="'+s.name+'" onerror="this.style.display=\'none\'">':'<span class="card-photo-emoji">'+s.emoji+'</span>';
    var gallHTML=s.gallery&&s.gallery.length?'<div class="gallery">'+s.gallery.map(function(g){return'<img src="'+g+'" onclick="openLightbox(\''+g+'\')" onerror="this.style.display=\'none\'">';}).join('')+'</div>':'';
    var dishHTML=s.dishes.map(function(d){var cls=d.type==='veg'?'veg-dish':d.type==='nonveg'?'nonveg-dish':'';var ic=d.type==='veg'?'🟢':d.type==='nonveg'?'🔴':'🟡';return'<div class="dish '+cls+'">'+ic+' <span>'+d.name+'</span> — '+d.desc+'</div>';}).join('');
    var restHTML=s.restaurants.map(function(r){return'<div class="restaurant"><span>🍽️ '+r+'</span></div>';}).join('');
    var rating=userRatings[s.id]||s.rating;
    var starsHTML='';for(var i=1;i<=5;i++)starsHTML+='<span class="star '+(i<=rating?'filled':'')+'" onclick="rateStar(\''+s.id+'\','+i+')">★</span>';
    starsHTML+='<span class="rating-count" id="rcount-'+s.id+'">'+rating+'/5</span>';
    var revHTML=(reviews[s.id]||[]).map(function(r){return'<div class="review-item"><div class="review-name">👤 '+r.name+' <span class="review-stars">'+'★'.repeat(r.stars)+'</span></div><div class="review-text">'+r.text+'</div></div>';}).join('');
    var waMsg=encodeURIComponent('Check out '+s.name+' food guide! 🍛 https://kuldeep117.github.io/india-food-map');
    var revStarHTML=[1,2,3,4,5].map(function(n){return'<span style="cursor:pointer;font-size:16px;color:#ffd700;opacity:.3" onclick="setRevStar(\''+s.id+'\','+n+')" id="revstar-'+s.id+'-'+n+'">★</span>';}).join('');
    card.innerHTML='<div class="card-photo">'+photoHTML+'<div class="region-badge">'+s.region+' India</div><div class="veg-badge '+s.diet+'">'+dietLabel+'</div></div>'
      +'<div class="card-body"><h2>'+s.emoji+' '+s.name+'</h2><p class="capital">🏛️ '+s.capital+'</p>'
      +'<div class="star-rating" id="stars-'+s.id+'">'+starsHTML+'</div>'
      +'<div class="section-label">🍽 Must Try Dishes</div>'+dishHTML+gallHTML
      +'<div class="section-label">🏪 Best Restaurants</div>'+restHTML
      +'<p class="price">💰 ₹'+s.budgetMin+'–'+s.budgetMax+' per meal</p>'
      +'<div class="tip">💡 '+s.tip+'</div>'
      +'<div class="card-actions"><a class="maps-btn" href="https://maps.google.com/?q='+s.mapsQuery+'" target="_blank">📍 Maps</a>'
      +'<button class="btn-wa-small" onclick="window.open(\'https://wa.me/?text='+waMsg+'\',\'_blank\')">📤 WhatsApp</button></div>'
      +'<div class="reviews-section"><div class="section-label">💬 Reviews</div><div id="reviews-'+s.id+'">'+revHTML+'</div>'
      +'<div class="review-form"><input type="text" placeholder="Your name" id="name-'+s.id+'">'
      +'<textarea placeholder="Share your food experience..." id="rev-'+s.id+'"></textarea>'
      +'<div style="display:flex;gap:5px;align-items:center;margin-bottom:5px"><span style="font-size:12px;color:var(--subtext)">Rate:</span>'+revStarHTML+'</div>'
      +'<button class="btn-small" onclick="addReview(\''+s.id+'\')">Post Review</button></div></div></div>';
    c.appendChild(card);
  });
}

function applyFilters(){
  var search=document.getElementById('search').value.toLowerCase();
  var sort=document.getElementById('sortSelect').value;
  var filtered=states.filter(function(s){
    var rOk=currentRegion==='all'||s.region===currentRegion;
    var dOk=currentDiet==='all'||s.diet===currentDiet||s.diet==='both';
    var sOk=!search||s.name.toLowerCase().includes(search)||s.capital.toLowerCase().includes(search)||s.dishes.some(function(d){return d.name.toLowerCase().includes(search);})||s.restaurants.some(function(r){return r.toLowerCase().includes(search);});
    return rOk&&dOk&&sOk;
  });
  if(sort==='name-az')filtered.sort(function(a,b){return a.name.localeCompare(b.name);});
  else if(sort==='name-za')filtered.sort(function(a,b){return b.name.localeCompare(a.name);});
  else if(sort==='budget-low')filtered.sort(function(a,b){return a.budgetMin-b.budgetMin;});
  else if(sort==='budget-high')filtered.sort(function(a,b){return b.budgetMax-a.budgetMax;});
  else if(sort==='rating')filtered.sort(function(a,b){return(userRatings[b.id]||b.rating)-(userRatings[a.id]||a.rating);});
  renderCards(filtered);
}

function setRegion(r,btn){currentRegion=r;document.querySelectorAll('#regionRow .btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');applyFilters();}
function setDiet(d,btn){currentDiet=d;document.querySelectorAll('#dietAll,#dietVeg,#dietNonveg').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');applyFilters();}
function clearAll(){document.getElementById('search').value='';currentRegion='all';currentDiet='all';document.getElementById('sortSelect').value='default';document.querySelectorAll('#regionRow .btn')[0].classList.add('active');document.getElementById('dietAll').classList.add('active');document.querySelectorAll('#regionRow .btn').forEach(function(b,i){if(i>0)b.classList.remove('active');});applyFilters();}
document.getElementById('search').addEventListener('keyup',applyFilters);

function rateStar(sid,num){userRatings[sid]=num;var c=document.getElementById('stars-'+sid);if(!c)return;c.querySelectorAll('.star').forEach(function(s,i){s.classList.toggle('filled',i<num);});var rc=document.getElementById('rcount-'+sid);if(rc)rc.textContent=num+'/5';}
function setRevStar(sid,num){revStars[sid]=num;for(var i=1;i<=5;i++){var el=document.getElementById('revstar-'+sid+'-'+i);if(el)el.style.opacity=i<=num?'1':'.3';}}
function addReview(sid){var name=document.getElementById('name-'+sid).value.trim();var text=document.getElementById('rev-'+sid).value.trim();var stars=revStars[sid]||5;if(!name||!text){alert('Please enter your name and review!');return;}if(!reviews[sid])reviews[sid]=[];reviews[sid].push({name:name,text:text,stars:stars});var c=document.getElementById('reviews-'+sid);if(c){var div=document.createElement('div');div.className='review-item';div.innerHTML='<div class="review-name">👤 '+name+' <span class="review-stars">'+'★'.repeat(stars)+'</span></div><div class="review-text">'+text+'</div>';c.appendChild(div);}document.getElementById('name-'+sid).value='';document.getElementById('rev-'+sid).value='';revStars[sid]=0;for(var i=1;i<=5;i++){var el=document.getElementById('revstar-'+sid+'-'+i);if(el)el.style.opacity='.3';}}
function openLightbox(src){document.getElementById('lightbox-img').src=src;document.getElementById('lightbox').classList.add('open');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}
function toggleTheme(){var h=document.documentElement,btn=document.querySelector('.theme-btn');if(h.getAttribute('data-theme')==='dark'){h.setAttribute('data-theme','light');btn.textContent='☀️';}else{h.setAttribute('data-theme','dark');btn.textContent='🌙';}}
function shareWhatsApp(){window.open('https://wa.me/?text='+encodeURIComponent('Check out this amazing India Food Map! 🍛🇮🇳 Find the best food in every Indian state! https://kuldeep117.github.io/india-food-map'),'_blank');}
window.addEventListener('scroll',function(){var btn=document.getElementById('backTop');btn.style.display=window.scrollY>400?'flex':'none';});
renderCards(states);
</script>
